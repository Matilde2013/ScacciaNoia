<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>ScacciaNoia</title>
    
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="ScacciaNoia">
    
    <link rel="apple-touch-icon" href="icona-app.png">
    
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div class="background-orbs bg-orb-1"></div>
    <div class="background-orbs bg-orb-2"></div>

    <div class="app-container">
        
        <section id="screen-home" class="screen active">
            <div class="glass-card header-card">
                <h1>ScacciaNoia ⚡</h1>
                <p>Trova istantaneamente qualcosa di figo da fare ed elimina la noia della giornata.</p>
            </div>

            <div class="glass-card main-card">
                <h3>Dove ti trovi adesso?</h3>
                <div class="category-buttons">
                    <button class="btn btn-category" data-category="in_casa">🏠 In Casa</button>
                    <button class="btn btn-category" data-category="all_aperto">🌳 All'Aperto</button>
                    <button class="btn btn-category" data-category="produttive">🚀 Produttive</button>
                </div>
            </div>

            <button id="btn-to-stats" class="btn btn-secondary">Guarda le tue statistiche 📊</button>
        </section>

        <section id="screen-result" class="screen">
            <div class="glass-card result-card">
                <span class="badge" id="result-badge">Categoria</span>
                <h2>Ecco la tua sfida:</h2>
                <p id="text-attivita">Caricamento attività...</p>
                
                <div class="result-actions">
                    <button id="btn-accetta" class="btn btn-success">Accetta la sfida! 🔥</button>
                    <button id="btn-Reroll" class="btn btn-reroll">Dai un'altra opzione 🔄</button>
                </div>
            </div>
            <button class="btn btn-secondary btn-back">Torna alla Home 🏠</button>
        </section>

        <section id="screen-stats" class="screen">
            <div class="glass-card stats-card">
                <h2>Le tue statistiche settimanali 📊</h2>
                <p>Quante volte hai sconfitto la noia in questa settimana:</p>
                
                <div class="chart-container">
                    <div class="chart-axis-y">
                        <span>10</span>
                        <span>5</span>
                        <span>0</span>
                    </div>
                    <div class="chart-bars" id="chart-bars-container">
                        </div>
                </div>
            </div>
            <button class="btn btn-secondary btn-back">Torna alla Home 🏠</button>
        </section>

    </div>

    <script src="script.js"></script>
</body>
</html>
